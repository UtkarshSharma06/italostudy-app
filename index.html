<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/pwa-logo-ios.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Italostudy | Student Portal</title>
    <meta name="description" content="Access your Italostudy dashboard, exams, and study materials." />
    <meta name="theme-color" content="#6366f1" />

  <!-- iOS PWA Splash Screens (Branded) -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" href="/splash/splash-dark.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" href="/splash/splash-light.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" href="/splash/splash-dark.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" href="/splash/splash-dark.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" href="/splash/splash-dark.png">
  <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" href="/splash/splash-dark.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ItaloStudy">
    
    <!-- Critical Styles for Skeleton -->
    <style>
      :root { --sk-bg: #f8fafc; --sk-bar: #e2e8f0; --sk-card: #ffffff; }
      .dark { --sk-bg: #020617; --sk-bar: #0f172a; --sk-card: #0f172a; }
      
      /* Instant Media Query Fallback */
      @media (prefers-color-scheme: dark) {
        :root:not(.light) { --sk-bg: #020617; --sk-bar: #0f172a; --sk-card: #0f172a; }
      }

      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--sk-bg); transition: background 0.2s ease; }
      .sk-bar { background: var(--sk-bar); border-radius: 4px; position: relative; overflow: hidden; }
      .sk-bar::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
        animation: sk-loading 1.5s infinite;
      }
      @keyframes sk-loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
      .sk-out { opacity: 0; transition: opacity 0.2s ease-out; pointer-events: none; }
    </style>
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme');
          const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
          if (theme === 'dark' || (!theme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Dashboard Skeleton -->
    <div id="app-sk" aria-hidden="true" style="position:fixed;inset:0;z-index:9999;background:var(--sk-bg);display:flex;flex-direction:column;">
      
      <!-- Desktop Grid Layout -->
      <div class="sk-desktop" style="display:grid;grid-template-columns:72px 1fr;grid-template-rows:56px 1fr;height:100vh;width:100vw;overflow:hidden;">
        
        <!-- SIDEBAR (Fixed Column) -->
        <div style="grid-row: 1 / 3; background:var(--sk-card); border-right:1px solid var(--sk-bar); display:flex; flex-direction:column; align-items:center; padding:24px 0; gap:32px;">
          <div class="sk-bar" style="width:36px;height:36px;border-radius:12px;"></div>
          <div style="display:flex; flex-direction:column; gap:20px;">
            <div class="sk-bar" style="width:24px;height:24px;border-radius:8px;opacity:0.6;"></div>
            <div class="sk-bar" style="width:24px;height:24px;border-radius:8px;opacity:0.6;"></div>
            <div class="sk-bar" style="width:24px;height:24px;border-radius:8px;opacity:0.6;"></div>
            <div class="sk-bar" style="width:24px;height:24px;border-radius:8px;opacity:0.6;"></div>
            <div class="sk-bar" style="width:24px;height:24px;border-radius:8px;opacity:0.6;"></div>
          </div>
        </div>

        <!-- HEADER (Fixed Row) -->
        <div style="grid-column: 2; background:var(--sk-card); border-bottom:1px solid var(--sk-bar); display:flex; align-items:center; justify-content:space-between; padding:0 32px;">
          <div class="sk-bar" style="width:140px;height:16px;border-radius:8px;opacity:0.4;"></div>
          <div style="display:flex; gap:16px; align-items:center;">
            <div class="sk-bar" style="width:32px;height:32px;border-radius:50%;opacity:0.2;"></div>
            <div class="sk-bar" style="width:100px;height:32px;border-radius:16px;opacity:0.6;"></div>
          </div>
        </div>

        <!-- MAIN CONTENT (Scrollable) -->
        <div style="grid-column: 2; grid-row: 2; overflow-y:auto; background:var(--sk-bg);">
          <!-- Hero Banner Section -->
          <div style="height:240px; background:var(--sk-card); border-bottom:1px solid var(--sk-bar); display:flex; align-items:center; justify-content:space-between; padding:0 64px; box-sizing:border-box;">
            <div style="display:flex; flex-direction:column; gap:20px;">
              <div class="sk-bar" style="width:80px;height:12px;border-radius:6px;opacity:0.3;"></div>
              <div class="sk-bar" style="width:320px;height:44px;border-radius:16px;"></div>
              <div class="sk-bar" style="width:440px;height:16px;border-radius:8px;opacity:0.3;"></div>
            </div>
            <div class="sk-bar" style="width:180px;height:180px;border-radius:50%;opacity:0.05;"></div>
          </div>

          <!-- Cards Grid -->
          <div style="max-width:1200px; margin:32px auto; padding:0 32px; box-sizing:border-box; display:grid; grid-template-columns: 8fr 4fr; gap:24px;">
            <div style="display:flex; flex-direction:column; gap:24px;">
              <div class="sk-bar" style="width:100%;height:160px;border-radius:24px;"></div>
              <div style="display:flex; gap:16px;">
                <div class="sk-bar" style="width:64px;height:84px;border-radius:16px;"></div>
                <div class="sk-bar" style="width:64px;height:84px;border-radius:16px;"></div>
                <div class="sk-bar" style="width:64px;height:84px;border-radius:16px;"></div>
                <div class="sk-bar" style="width:64px;height:84px;border-radius:16px;"></div>
              </div>
              <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:12px;">
                <div class="sk-bar" style="height:100px;border-radius:20px;"></div>
                <div class="sk-bar" style="height:100px;border-radius:20px;"></div>
                <div class="sk-bar" style="height:100px;border-radius:20px;"></div>
                <div class="sk-bar" style="height:100px;border-radius:20px;"></div>
                <div class="sk-bar" style="height:100px;border-radius:20px;"></div>
              </div>
            </div>
            <div style="display:flex; flex-direction:column; gap:24px;">
              <div class="sk-bar" style="width:100%;height:140px;border-radius:24px;"></div>
              <div class="sk-bar" style="width:100%;height:220px;border-radius:32px; background:indigo; opacity:0.1;"></div>
            </div>
          </div>
        </div>
      </div>
 
      <!-- Mobile Skeleton (Hidden on Desktop) -->
      <div class="sk-mobile" style="display:none;flex-direction:column;height:100vh;background:var(--sk-bg);padding:40px 24px 24px;">
        <!-- Greeting Header -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;position:relative;">
          <div style="display:flex;flex-direction:column;gap:12px;padding-top:16px;">
            <div class="sk-bar" style="width:96px;height:16px;border-radius:8px;opacity:0.4;"></div>
            <div class="sk-bar" style="width:192px;height:56px;border-radius:16px;"></div>
            <div class="sk-bar" style="width:224px;height:16px;border-radius:8px;opacity:0.4;margin-top:16px;"></div>
          </div>
          <!-- Avatar/Character Circle -->
          <div class="sk-bar" style="width:128px;height:128px;border-radius:50%;opacity:0.1;position:absolute;right:-16px;top:-16px;"></div>
        </div>
 
        <!-- Next Lesson Card -->
        <div class="sk-bar" style="width:100%;height:128px;border-radius:40px;margin-bottom:24px;"></div>
 
        <!-- Bottom Grid -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="sk-bar" style="height:192px;border-radius:35px;"></div>
          <div class="sk-bar" style="height:192px;border-radius:35px;"></div>
        </div>
      </div>
    </div>

    <style>
      @media (max-width: 768px) {
        .sk-desktop { display: none !important; }
        .sk-mobile { display: flex !important; }
      }
    </style>

    <script>
      // Early capture of PWA install prompt to prevent "Installation Pending" issues
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPWAData = e;
      });

      // Immediately hide the dashboard skeleton for public/auth pages to prevent layout flash
      if (window.location.pathname.includes('/auth') || window.location.pathname.includes('/waiting-room') || window.location.pathname.includes('/solutions')) {
        const sk = document.getElementById('app-sk');
        if (sk) sk.style.display = 'none';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
